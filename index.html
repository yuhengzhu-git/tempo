<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Music Practice Speed Controller</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <header>
            <h1>Practice Player</h1>
            <p>Upload a track and adjust the speed to practice along.</p>
        </header>

        <main class="player-card glass">
            <div class="file-upload">
                <input type="file" id="audio-upload" accept="audio/*, audio/mp3, audio/mpeg, .mp3, .m4a, .wav" class="file-input">
                <label for="audio-upload" class="upload-btn">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>
                    <span>Choose Audio File</span>
                </label>
                <div id="file-name" class="file-name">No file chosen</div>
            </div>

            <div class="audio-container hidden" id="audio-container">
                <audio id="audio-player">
                    Your browser does not support the audio element.
                </audio>

                <!-- Custom Audio Controls -->
                <div class="custom-player">
                    <button id="restart-btn" class="control-btn secondary-btn" title="Restart">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="1 4 1 10 7 10"></polyline><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"></path></svg>
                    </button>
                    <button id="play-pause-btn" class="control-btn play-btn" title="Play/Pause">
                        <!-- Play Icon -->
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
                    </button>
                    <div class="time-display" id="current-time">0:00</div>
                    <input type="range" id="progress-bar" class="custom-slider progress-slider" min="0" max="100" value="0">
                    <div class="time-display" id="duration">0:00</div>
                </div>

                <div class="controls-section">
                    <div class="speed-control-header">
                        <label for="speed-slider">Playback Speed</label>
                        <span id="speed-display" class="speed-badge">1.00x</span>
                    </div>
                    <div class="slider-container">
                        <span class="speed-label">0.25x</span>
                        <input type="range" id="speed-slider" min="0.25" max="2.0" step="0.05" value="1.0" class="custom-slider">
                        <span class="speed-label">2.00x</span>
                    </div>
                    
                    <div class="quick-speeds">
                        <button class="speed-btn" data-speed="0.5">0.5x</button>
                        <button class="speed-btn" data-speed="0.75">0.75x</button>
                        <button class="speed-btn active" data-speed="1.0">1.0x</button>
                        <button class="speed-btn" data-speed="1.25">1.25x</button>
                        <button class="speed-btn" data-speed="1.5">1.5x</button>
                    </div>
                </div>
            </div>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
